services:
  # ── FastAPI Web Service ──────────────────────────────────────────────────────
  - type: web
    name: stock-analyzer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: ./start.sh
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random string
      - key: CORS_ORIGINS
        sync: false          # e.g. ["https://your-app.vercel.app"]
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: NEWS_API_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: stock-analyzer-celery
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: NEWS_API_KEY
        sync: false
